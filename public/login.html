<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animocamind - Login with Telegram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 0.95rem; color: #999; margin-bottom: 32px; }
    #login-widget-container { min-height: 50px; display: flex; justify-content: center; margin-bottom: 24px; }
    .status-box { display: none; margin-top: 20px; padding: 16px; border-radius: 12px; font-size: 0.9rem; text-align: left; }
    .status-box.info { display: block; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
    .status-box.success { display: block; background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); }
    .status-box.error { display: block; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn { display: inline-block; padding: 12px 24px; background: #0088cc; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem; transition: background 0.2s; }
    .btn:hover { background: #006699; }
    .hidden { display: none !important; }
    .bot-status { margin-top: 12px; font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Animocamind</h1>
    <p class="subtitle">Login with Telegram to create your personal AI agent bot</p>
    <div id="login-widget-container"></div>
    <div id="status-box" class="status-box"></div>
    <div id="deeplink-container" class="hidden">
      <a id="deeplink-btn" class="btn" href="#" target="_blank">Create Your Bot</a>
      <div id="bot-status" class="bot-status"></div>
    </div>
  </div>
  <script>
    const statusBox = document.getElementById('status-box');
    const deeplinkContainer = document.getElementById('deeplink-container');
    const deeplinkBtn = document.getElementById('deeplink-btn');
    const botStatusEl = document.getElementById('bot-status');
    const widgetContainer = document.getElementById('login-widget-container');

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = 'status-box ' + type;
    }

    // Fetch bot username from the server and inject the Telegram Login Widget
    (async function initWidget() {
      try {
        const res = await fetch('/api/auth/config');
        const data = await res.json();
        if (!data.botUsername) { showStatus('Failed to load login widget config', 'error'); return; }
        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.setAttribute('data-telegram-login', data.botUsername);
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');
        script.setAttribute('data-request-access', 'write');
        widgetContainer.appendChild(script);
      } catch (err) {
        showStatus('Failed to load login widget: ' + err.message, 'error');
      }
    })();

    async function onTelegramAuth(user) {
      showStatus('Verifying login...', 'info');
      try {
        const res = await fetch('/api/auth/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user),
        });
        const data = await res.json();
        if (!res.ok) { showStatus('Login failed: ' + (data.error || 'Unknown error'), 'error'); return; }
        showStatus('Welcome, ' + data.user.firstName + '!', 'success');
        deeplinkBtn.href = data.deepLink;
        deeplinkContainer.classList.remove('hidden');
        pollBotStatus(data.accessToken);
      } catch (err) { showStatus('Network error: ' + err.message, 'error'); }
    }

    let pollInterval = null;
    async function pollBotStatus(accessToken) {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch('/api/bots/mine', { headers: { 'Authorization': 'Bearer ' + accessToken } });
          const data = await res.json();
          if (data.ok && data.bot) {
            botStatusEl.textContent = data.bot.status === 'ACTIVE'
              ? 'Your bot @' + data.bot.botUsername + ' is live!'
              : 'Bot status: ' + data.bot.status;
            if (data.bot.status === 'ACTIVE') clearInterval(pollInterval);
          }
        } catch { /* retry */ }
      }, 3000);
    }

    window.onTelegramAuth = onTelegramAuth;
  </script>
</body>
</html>
